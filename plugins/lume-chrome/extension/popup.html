<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lume Browser</title>
    <style>
      body { width: 280px; margin: 0; padding: 14px; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .status { padding: 4px 8px; border-radius: 999px; background: #eee; font-size: 12px; }
      button { width: 100%; margin-top: 10px; padding: 8px; border-radius: 8px; border: 1px solid #ddd; background: white; }
      pre { white-space: pre-wrap; font-size: 11px; color: #555; }
    </style>
  </head>
  <body>
    <div class="row"><strong>Lume Browser</strong><span id="status" class="status">checking</span></div>
    <p id="host">Native host: unknown</p>
    <button id="open-settings">Open Lume settings</button>
    <button id="diagnose">Run diagnostics</button>
    <pre id="details"></pre>
    <script src="dist/popup/popup.js" type="module"></script>
  </body>
</html>
